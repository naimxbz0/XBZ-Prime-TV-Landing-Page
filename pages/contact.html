<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - XBZ Prime TV</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .contact-page {
            max-width: 600px;
            margin: 100px auto 60px;
            padding: 40px;
            background: #1A1A1A;
            border-radius: 8px;
            border: 1px solid #333;
            text-align: center;
        }
        .contact-page h1 { color: #E50914; margin-bottom: 16px; }
        .contact-page p { color: #B3B3B3; margin-bottom: 24px; }
        .contact-info { display: flex; flex-direction: column; gap: 12px; }
        .contact-item {
            display: flex; align-items: center; gap: 12px;
            padding: 16px; background: #252525; border-radius: 4px;
            color: #fff;
        }
        .contact-item i { color: #E50914; font-size: 1.2rem; }
        .back-link { display: inline-block; margin-top: 24px; color: #E50914; }
    </style>
</head>
<body>
    <div class="container">
        <div class="contact-page">
            <h1>Contact Us</h1>
            <p>Questions? Suggestions? We're here to help!</p>
            <div class="contact-info">
                <div class="contact-item">
                    <i class="fas fa-envelope"></i>
                    <span>naimxbz@gmail.com</span>
                </div>
                <div class="contact-item">
                    <i class="fab fa-telegram"></i>
                    <span>@naimxbzofficial</span>
                </div>
                <div class="contact-item">
                    <i class="fab fa-facebook"></i>
                    <span>Naim Xbz</span>
                </div>
            </div>
            <a href="../index.html" class="back-link">← Back to Home</a>
        </div>
    </div>
</body>
</html>
